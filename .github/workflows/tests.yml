name: Tests

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[browser,dev]"
          pip install numpy Pillow

      - name: Install Chromium (Linux only)
        if: runner.os == 'Linux'
        run: python -m patchright install chromium

      - name: Run unit tests
        run: pytest tests/ -q --ignore=tests/integration --ignore=tests/smoke --ignore=tests/benchmarks

  smoke-tests:
    name: Smoke Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install numpy Pillow pytest-benchmark

      - name: Run smoke tests
        run: pytest tests/smoke/ -v

      - name: Run benchmarks
        run: pytest tests/benchmarks/ --benchmark-only -v --benchmark-min-rounds=10

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[browser,dev]"
          pip install numpy Pillow

      - name: Install Chromium
        run: python -m patchright install chromium

      - name: Run integration tests
        run: pytest tests/integration/ --run-integration -v

      - name: Run full suite
        run: pytest tests/ --run-integration -q
