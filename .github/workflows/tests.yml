name: Tests

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ "$RUNNER_OS" = "Windows" ]; then
            pip install -e ".[windows,dev,tracing]"
          else
            pip install -e ".[dev,tracing]"
          fi
          pip install numpy Pillow hypothesis opentelemetry-exporter-otlp prometheus_client tzdata
        shell: bash

      # Note: the browser/Patchright/Chromium install step was removed in the
      # v2.0 rename — the SuperBrowser surface is gone and the [browser]
      # extra no longer exists. Desktop-only test matrix.

      - name: Run unit tests
        # On Windows CI, ignore stress tests (hypothesis property tests spawn
        # threads that crash with KeyboardInterrupt on headless Windows runners)
        # and batch33 macOS mock tests (patch sys.platform to darwin → crash).
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            pytest tests/ -q --ignore=tests/integration --ignore=tests/smoke --ignore=tests/benchmarks --ignore=tests/stress --ignore=tests/test_batch33
          else
            pytest tests/ -q --ignore=tests/integration --ignore=tests/smoke --ignore=tests/benchmarks
          fi
        shell: bash

  smoke-tests:
    name: Smoke Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install numpy Pillow pytest-benchmark

      - name: Run smoke tests
        run: pytest tests/smoke/ -v

      - name: Run benchmarks
        run: pytest tests/benchmarks/ --benchmark-only -v --benchmark-min-rounds=10

  # Integration tests are temporarily disabled. The v2.0 rename removed the
  # SuperBrowser browser-automation surface, and the existing integration
  # suite was built around that surface (Patchright/Chromium, browser flows).
  # Re-enable once integration tests are rewritten for desktop-only automation.
  integration-tests:
    name: Integration Tests (disabled — v2 rewrite pending)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: false  # gate until integration suite is updated for v2 desktop-only

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install numpy Pillow

      - name: Run integration tests
        run: pytest tests/integration/ --run-integration -v

      - name: Run full suite
        run: pytest tests/ --run-integration -q
