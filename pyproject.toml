[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "deskaoy"
version = "2.0.0"
description = "Surface-agnostic desktop agent for the AI Operating System â€” perceives any screen, acts on any element, recovers from failures autonomously."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Deskaoy Contributors" },
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Desktop Environment",
    "Topic :: Software Development :: Testing",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

[project.urls]
Repository = "https://github.com/Octo-Lex/Deskaoy"
Documentation = "https://github.com/Octo-Lex/Deskaoy#readme"
Changelog = "https://github.com/Octo-Lex/Deskaoy/blob/main/CHANGELOG.md"

[project.scripts]
deskaoy = "deskaoy.cli.main:main"

[project.optional-dependencies]
llm = [
    "openai>=1.0",
    "anthropic>=0.30",
]
mcp = [
    "mcp>=1.0",
]
rest = [
    "aiohttp>=3.9",
]
windows = [
    "pyautogui>=0.9",
    "pywin32>=306; platform_system == 'Windows'",
    "comtypes>=1.4",
    "mss>=10.0",
    "Pillow>=10.0",
    "psutil>=5.9",
]
daemon = [
    # stdlib-only — asyncio pipes/sockets. No external deps required.
    # Optional: psutil for process management (auto-start daemon)
    "psutil>=5.9",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.5",
    "mypy>=1.10",
    "build>=1.0",
]
grounding = [
    "ultralytics>=8.0",
    "transformers>=4.40",
    "paddleocr>=2.7",
    "paddlepaddle>=2.5",
    "torch>=2.0",
    "accelerate>=0.20",
]
tracing = [
    "opentelemetry-api>=1.40",
    "opentelemetry-sdk>=1.40",
]
tracing-otlp = [
    "deskaoy[tracing]",
    "opentelemetry-exporter-otlp-proto-grpc>=1.40",
]
tracing-prometheus = [
    "deskaoy[tracing]",
    "opentelemetry-exporter-prometheus>=0.45b0",
]
all = [
    "deskaoy[llm,mcp,rest,windows,dev,daemon]",
]

[tool.hatch.build.targets.wheel]
packages = ["src/deskaoy"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: tests requiring a real browser (deselect with '-m \"not integration\"')",
    "grounding: tests requiring ML weights (deselect with '-m \"not grounding\"')",
]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501", "SIM108"]

[tool.ruff.lint.isort]
known-first-party = ["deskaoy"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = ["tests/"]
